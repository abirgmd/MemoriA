<div class="profile-page">
  <h1>Profil Soignant</h1>
  <p>Completez vos informations professionnelles.</p>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <label>Numero d ordre <input type="text" formControlName="numeroOrdre" /></label>
    <label>Specialite <input type="text" formControlName="specialite" /></label>
    <label>Hopital <input type="text" formControlName="hopital" /></label>
    <label>Telephone secondaire <input type="text" formControlName="numeroTelephone2" /></label>
    <label>Diplomes <textarea formControlName="diplomes"></textarea></label>
    <label>Annees d experience <input type="number" formControlName="anneesExperience" min="0" /></label>
    <label>Biographie <textarea formControlName="biographie"></textarea></label>
    <label>Date debut exercice <input type="date" formControlName="dateDebutExercice" /></label>

    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
    <p class="success" *ngIf="successMessage">{{ successMessage }}</p>
    <button type="submit" [disabled]="isSubmitting">{{ isSubmitting ? 'Enregistrement...' : 'Enregistrer' }}</button>
  </form>
</div>
