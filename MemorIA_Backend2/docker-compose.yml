version: '3.8'

services:

  db:
    image: mysql:8.0
    container_name: memoria_db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: Memorias_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build: .
    container_name: memoria_backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/Memorias_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQL8Dialect

      # Mail
      SPRING_MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      SPRING_MAIL_PORT: ${MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME:-change@me.com}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD:-changeme}
      APP_MAIL_FROM: ${MAIL_FROM:-change@me.com}

      # Admin bootstrap
      APP_ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@memoria.com}
      APP_ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@123}

      # CORS
      APP_CORS_ALLOWED_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:4200}
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

volumes:
  mysql_data:
