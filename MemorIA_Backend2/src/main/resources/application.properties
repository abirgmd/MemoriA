# ===============================
# APPLICATION
# ===============================
spring.application.name=MemorIA_backend
server.port=8080

# ===============================

# MYSQL DATABASE CONFIGURATION
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/Memoria2_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ===============================
# OPTIONAL (Good Practice)
# ===============================
spring.jpa.open-in-view=false

# ===============================
# JACKSON (Date/Time serialization)
# ===============================
spring.jackson.serialization.write-dates-as-timestamps=false

# ===============================
# CORS
# ===============================
app.cors.allowed-origins=http://localhost:3000,http://localhost:4200

# ===============================
# EMAIL (configure with your SMTP)
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=Jasserchouat3@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=jasserchouat3@gmail.com

# ===============================
# TWILIO (SMS & Voice Calls)
# ===============================
twilio.account-sid=YOUR_TWILIO_ACCOUNT_SID
twilio.auth-token=YOUR_TWILIO_AUTH_TOKEN
twilio.phone-number=+21699328368

# ===============================
# DEFAULT ADMIN BOOTSTRAP
# ===============================
app.admin.email=admin@memoria.com
app.admin.password=Admin@123
