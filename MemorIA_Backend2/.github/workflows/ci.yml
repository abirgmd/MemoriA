name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  # ─────────────────────────────────────────────────────────────
  # Job 1: Build & Test
  # ─────────────────────────────────────────────────────────────
  test:
    name: Build & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: ./mvnw test -B

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Job 2: Build JAR & Docker image (only on main branch)
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build JAR & Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR (skip tests – already ran)
        run: ./mvnw package -DskipTests -B

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: memoria-backend-jar
          path: target/*.jar
          retention-days: 30

      - name: Build Docker image
        run: docker build -t memoria-backend:${{ github.sha }} -t memoria-backend:latest .

      # Optional: push to a registry (uncomment and configure secrets)
