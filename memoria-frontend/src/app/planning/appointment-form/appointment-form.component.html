<div class="modal-overlay" (click)="cancelled.emit()">
  <div class="modal-panel" (click)="$event.stopPropagation()">

    <div class="modal-header">
      <div class="modal-title-group">
        <div class="modal-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
        </div>
        <div>
          <h2>{{ isEdit ? 'Modifier le rendez-vous' : 'Nouveau rendez-vous' }}</h2>
          <p>{{ isEdit ? 'Mettez à jour les informations' : 'Planifiez une consultation' }}</p>
        </div>
      </div>
      <button class="close-btn" (click)="cancelled.emit()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="modal-body">
      <form [formGroup]="form" (ngSubmit)="submit()">

        <div class="form-group" [class.has-error]="isInvalid('patientId')">
          <label>Patient <span class="required">*</span></label>
          <select formControlName="patientId" [disabled]="loading">
            <option value="" disabled>Sélectionner un patient...</option>
            <option *ngFor="let p of patients" [value]="p.id">
              {{ p.prenom }} {{ p.nom }}
            </option>
          </select>
          <span class="error-msg" *ngIf="isInvalid('patientId')">Veuillez sélectionner un patient</span>
          <span class="hint" *ngIf="patients.length === 0 && !loading">Aucun patient enregistré</span>
        </div>

        <div class="form-group" [class.has-error]="isInvalid('title')">
          <label>Titre <span class="required">*</span></label>
          <input type="text" formControlName="title" placeholder="Ex: Consultation de suivi">
          <span class="error-msg" *ngIf="isInvalid('title')">Titre requis</span>
        </div>

        <div class="form-group">
          <label>Type <span class="required">*</span></label>
          <div class="type-grid">
            <button type="button"
                    *ngFor="let t of types"
                    class="type-pill"
                    [class.active]="form.get('type')?.value === t"
                    (click)="form.get('type')?.setValue(t)">
              {{ t }}
            </button>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group" [class.has-error]="isInvalid('startTime')">
            <label>Début <span class="required">*</span></label>
            <input type="datetime-local" formControlName="startTime">
            <span class="error-msg" *ngIf="isInvalid('startTime')">Date de début requise</span>
          </div>
          <div class="form-group" [class.has-error]="isInvalid('endTime')">
            <label>Fin <span class="required">*</span></label>
            <input type="datetime-local" formControlName="endTime">
            <span class="error-msg" *ngIf="isInvalid('endTime')">Date de fin requise</span>
          </div>
        </div>

        <div class="form-group" *ngIf="isEdit">
          <label>Statut</label>
          <select formControlName="status">
            <option value="PENDING">En attente</option>
            <option value="CONFIRMED">Confirmé</option>
            <option value="CANCELLED">Annulé</option>
            <option value="COMPLETED">Terminé</option>
          </select>
        </div>

        <div class="form-group">
          <label>Notes / Description</label>
          <textarea formControlName="description" rows="3" placeholder="Informations complémentaires..."></textarea>
        </div>

        <div class="alert-error" *ngIf="error">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
          </svg>
          {{ error }}
        </div>

        <div class="form-actions">
          <button type="button" class="btn-cancel" (click)="cancelled.emit()">Annuler</button>
          <button type="submit" class="btn-save" [disabled]="saving">
            <svg *ngIf="!saving" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
            <span *ngIf="saving" class="spinner"></span>
            {{ isEdit ? 'Enregistrer' : 'Créer le rendez-vous' }}
          </button>
        </div>

      </form>
    </div>

  </div>
</div>
