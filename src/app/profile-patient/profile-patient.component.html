<div class="profile-page">
  <h1>Profil Patient</h1>
  <p>Completez vos informations personnelles pour activer votre espace patient.</p>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <label>Date de naissance <input type="date" formControlName="dateNaissance" /></label>
    <label>Sexe
      <select formControlName="sexe">
        <option value="M">M</option>
        <option value="F">F</option>
        <option value="Autre">Autre</option>
      </select>
    </label>
    <label>Numero securite sociale <input type="text" formControlName="numeroSecuriteSociale" /></label>
    <label>Adresse <input type="text" formControlName="adresse" /></label>
    <label>Ville <input type="text" formControlName="ville" /></label>
    <label>Groupe sanguin
      <select formControlName="groupeSanguin">
        <option value="">Non precise</option>
        <option value="A_pos">A+</option>
        <option value="A_neg">A-</option>
        <option value="B_pos">B+</option>
        <option value="B_neg">B-</option>
        <option value="AB_pos">AB+</option>
        <option value="AB_neg">AB-</option>
        <option value="O_pos">O+</option>
        <option value="O_neg">O-</option>
      </select>
    </label>
    <label>Mutuelle <input type="text" formControlName="mutuelle" /></label>
    <label>Numero police mutuelle <input type="text" formControlName="numeroPoliceMutuelle" /></label>

    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
    <p class="success" *ngIf="successMessage">{{ successMessage }}</p>
    <button type="submit" [disabled]="isSubmitting">{{ isSubmitting ? 'Enregistrement...' : 'Enregistrer' }}</button>
  </form>
</div>
