# ===============================
# APPLICATION
# ===============================
spring.application.name=MemorIA_backend_diagnostic
server.port=8080

# ===============================
# MYSQL DATABASE CONFIGURATION
# ===============================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/memoria_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ===============================
# OPTIONAL (Good Practice)
# ===============================
spring.jpa.open-in-view=false

# ===============================
# AI SERVICE (Python Flask)
# ===============================
ai.service.url=${AI_SERVICE_URL:http://localhost:5000}

# ===============================
# FILE UPLOAD CONFIGURATION
# ===============================
# Enable multipart uploads
spring.servlet.multipart.enabled=true
# Max file size (default is 1MB, increasing to 10MB)
spring.servlet.multipart.max-file-size=10MB
# Max request size
spring.servlet.multipart.max-request-size=10MB
# Enable lazy resolution of multipart file
spring.servlet.multipart.resolve-lazily=false
# Temp location for file uploads
spring.servlet.multipart.location=${java.io.tmpdir}
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
localhost