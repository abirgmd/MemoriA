<div class="profile-page">
  <h1>Patient Profile</h1>
  <p>Complete your personal information to activate your patient area.</p>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <label>Date of Birth <input type="date" formControlName="dateNaissance" /></label>
    <label>Gender
      <select formControlName="sexe">
        <option value="M">Male</option>
        <option value="F">Female</option>
        <option value="Autre">Other</option>
      </select>
    </label>
    <label>Social Security Number <input type="text" formControlName="numeroSecuriteSociale" /></label>
    <label>Address <input type="text" formControlName="adresse" /></label>
    <label>City <input type="text" formControlName="ville" /></label>
    <label>Blood Type
      <select formControlName="groupeSanguin">
        <option value="">Not Specified</option>
        <option value="A_pos">A+</option>
        <option value="A_neg">A-</option>
        <option value="B_pos">B+</option>
        <option value="B_neg">B-</option>
        <option value="AB_pos">AB+</option>
        <option value="AB_neg">AB-</option>
        <option value="O_pos">O+</option>
        <option value="O_neg">O-</option>
      </select>
    </label>
    <label>Insurance Company <input type="text" formControlName="mutuelle" /></label>
    <label>Insurance Policy Number <input type="text" formControlName="numeroPoliceMutuelle" /></label>

    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
    <p class="success" *ngIf="successMessage">{{ successMessage }}</p>
    <button type="submit" [disabled]="isSubmitting">{{ isSubmitting ? 'Saving...' : 'Save' }}</button>
  </form>
</div>
