<div class="users-page">
  <header class="users-header">
    <h1>Users Management</h1>
    <div class="header-actions">
      <button class="primary-btn" type="button" (click)="goToSignup()">Create User</button>
      <button type="button" (click)="logout()">Logout</button>
    </div>
  </header>

  <p class="info" *ngIf="isLoading">Loading users...</p>
  <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
  <p class="success" *ngIf="successMessage">{{ successMessage }}</p>

  <section class="users-table" *ngIf="!isLoading">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Role</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of users">
          <td>{{ user.id }}</td>
          <td>{{ user.prenom }} {{ user.nom }}</td>
          <td>{{ user.email }}</td>
          <td>{{ user.telephone }}</td>
          <td>{{ user.role }}</td>
          <td>{{ user.actif ? 'Active' : 'Inactive' }}</td>
          <td class="actions">
            <button
              *ngIf="!user.actif"
              class="success-btn"
              type="button"
              (click)="confirmUser(user)">
              Confirm + Email
            </button>
            <button type="button" (click)="startEdit(user)">Edit</button>
            <button class="danger-btn" type="button" (click)="deleteUser(user)">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </section>

  <section class="edit-panel" *ngIf="editingUserId !== null">
    <h2>Edit User #{{ editingUserId }}</h2>
    <form [formGroup]="editForm" (ngSubmit)="saveEdit()">
      <div class="field-grid">
        <label>
          Last Name
          <input type="text" formControlName="nom" />
        </label>
        <label>
          First Name
          <input type="text" formControlName="prenom" />
        </label>
        <label>
          Email
          <input type="email" formControlName="email" />
        </label>
        <label>
          Phone
          <input type="tel" formControlName="telephone" />
        </label>
        <label>
          Role
          <select formControlName="role">
            <option value="PATIENT">Patient</option>
            <option value="SOIGNANT">Soignant</option>
            <option value="ACCOMPAGNANT">Accompagnant</option>
            <option value="ADMINISTRATEUR">Administrateur</option>
          </select>
        </label>
        <label>
          Status
          <select formControlName="actif">
            <option [ngValue]="true">Active</option>
            <option [ngValue]="false">Inactive</option>
          </select>
        </label>
        <label>
          Profile Completed
          <select formControlName="profileCompleted">
            <option [ngValue]="true">Yes</option>
            <option [ngValue]="false">No</option>
          </select>
        </label>
        <label class="full-width">
          Password (optional, only if you want to change it)
          <input type="password" formControlName="password" />
        </label>
      </div>

      <div class="panel-actions">
        <button class="primary-btn" type="submit" [disabled]="isSaving">
          {{ isSaving ? 'Saving...' : 'Save Changes' }}
        </button>
        <button type="button" (click)="cancelEdit()">Cancel</button>
      </div>
    </form>
  </section>
</div>
