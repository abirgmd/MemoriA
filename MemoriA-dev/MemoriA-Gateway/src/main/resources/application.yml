spring:
  main:
    web-application-type: reactive
  application:
    name: memoria-gateway
  cloud:
    gateway:
      routes:
        - id: identity-service
          uri: lb://identity-service
          predicates:
            - Path=/api/identity/**,/api/auth/**,/api/users/**

        - id: planning-service
          uri: lb://planning-service
          predicates:
            - Path=/api/planning/**

        - id: alerts-service
          uri: lb://alerts-service
          predicates:
            - Path=/api/alerts/**

server:
  port: 8888

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
