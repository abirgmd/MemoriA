spring:
  application:
    name: identity-service
  datasource:
    url: jdbc:mysql://localhost:3307/users_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

server:
  port: 8094

management:
  endpoints:
    web:
      exposure:
        include: health,info

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    appname: identity-service

jwt:
  secret: ${JWT_SECRET:MySecretKeyForJWTTokenGenerationAndValidation12345}
  expiration: ${JWT_EXPIRATION:86400000}
